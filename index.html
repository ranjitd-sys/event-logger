<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Event Stream Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 24px; color: #222; }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #666; margin-bottom: 20px; }
    .controls { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
    input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; width: 200px; }
    button { padding: 8px 18px; border: 1px solid #ccc; border-radius: 8px; background: #fff; font-size: 14px; cursor: pointer; }
    button:hover { background: #f0f0f0; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat { background: #fff; border-radius: 10px; padding: 14px 16px; border: 0.5px solid #e0e0e0; }
    .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 500; }
    .events { display: flex; flex-direction: column; gap: 10px; }
    .event-card { background: #fff; border-radius: 10px; border: 0.5px solid #e0e0e0; padding: 14px 16px; }
    .event-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .event-name { font-size: 14px; font-weight: 500; }
    .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
    .badge-blue { background: #e6f0fb; color: #185fa5; }
    .badge-purple { background: #eeedfe; color: #534ab7; }
    .seq { font-size: 11px; color: #999; margin-bottom: 8px; }
    .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
    .field { font-size: 13px; }
    .field-label { color: #888; font-size: 11px; }
    .field-value { color: #222; font-weight: 500; word-break: break-all; }
    .status { display: flex; align-items: center; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid #eee; font-size: 12px; color: #888; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #f5a623; display: inline-block; }
    .dot.done { background: #4caf50; }
    #status-bar { font-size: 13px; color: #666; margin-bottom: 12px; min-height: 20px; }
  </style>
</head>
<body>
  <h1>Event Stream Viewer</h1>
  <p class="subtitle">Connects to your SSE endpoint and displays events in real time</p>

  <div class="controls">
    <input id="sid" placeholder="stream id (e.g. test)" value="test" />
    <input id="offset" placeholder="offset" value="-1" style="width:100px" />
    <button onclick="connect()">Connect ↗</button>
    <button onclick="clearAll()" style="color:#c0392b">Clear</button>
  </div>

  <div id="status-bar">Not connected.</div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total events</div>
      <div class="stat-value" id="count">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">B2B partner mappings</div>
      <div class="stat-value" id="b2b-count">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Stock item mappings</div>
      <div class="stat-value" id="stock-count">0</div>
    </div>
  </div>

  <div class="events" id="events"></div>

  <script>
    let es;
    let total = 0, b2b = 0, stock = 0;

    function connect() {
      if (es) es.close();
      clearAll();

      const sid = document.getElementById("sid").value.trim();
      const offset = document.getElementById("offset").value.trim();
      const url = `http://20.87.39.196/api/sync/${sid}?offset=${offset}`;

      document.getElementById("status-bar").textContent = `Connecting to ${url}...`;

      es = new EventSource(url);

      es.onmessage = (e) => {
        try {
          const row = JSON.parse(e.data);
          renderEvent(row);
        } catch {}
      };

      es.addEventListener("done", () => {
        document.getElementById("status-bar").textContent = `Stream complete. ${total} events received.`;
        es.close();
      });

      es.onerror = () => {
        document.getElementById("status-bar").textContent = "Connection closed or error.";
        es.close();
      };

      es.onopen = () => {
        document.getElementById("status-bar").textContent = `Connected. Receiving events...`;
      };
    }

    function renderEvent(row) {
      total++;
      const isB2B = row.event_name === "v1.CreateB2BBusinessPartnerMapping";
      const isStock = row.event_name === "v1.CreateStockItemMapping";
      if (isB2B) b2b++;
      if (isStock) stock++;

      document.getElementById("count").textContent = total;
      document.getElementById("b2b-count").textContent = b2b;
      document.getElementById("stock-count").textContent = stock;

      const args = row.args || {};
      const created = new Date(row.created_at).toLocaleString();

      const card = document.createElement("div");
      card.className = "event-card";

      if (isB2B) {
        card.innerHTML = `
          <div class="event-header">
            <div class="event-name">B2B Business Partner Mapping</div>
            <span class="badge badge-blue">${row.stream_id}</span>
          </div>
          <div class="seq">seq #${row.seqnum} &nbsp;·&nbsp; ${created}</div>
          <div class="fields">
            <div class="field"><div class="field-label">Buyer name</div><div class="field-value">${args.buyerName || '—'}</div></div>
            <div class="field"><div class="field-label">Order ID</div><div class="field-value">${args.orderId || '—'}</div></div>
            <div class="field"><div class="field-label">Buyer GST</div><div class="field-value">${args.buyerGST || '—'}</div></div>
            <div class="field"><div class="field-label">State</div><div class="field-value">${args.state || '—'}</div></div>
            <div class="field"><div class="field-label">Marketplace</div><div class="field-value">${args.marketplace || '—'}</div></div>
            <div class="field"><div class="field-label">Company DB</div><div class="field-value">${args.companyDB || '—'}</div></div>
          </div>
          <div class="status"><span class="dot"></span> Pending</div>
        `;
      } else if (isStock) {
        card.innerHTML = `
          <div class="event-header">
            <div class="event-name">Stock Item Mapping</div>
            <span class="badge badge-purple">${row.stream_id}</span>
          </div>
          <div class="seq">seq #${row.seqnum} &nbsp;·&nbsp; ${created}</div>
          <div class="fields">
            <div class="field"><div class="field-label">SKU</div><div class="field-value">${args.sku || '—'}</div></div>
            <div class="field"><div class="field-label">Marketplace</div><div class="field-value">${args.marketplace || '—'}</div></div>
            <div class="field"><div class="field-label">GST %</div><div class="field-value">${args.gst || '—'}%</div></div>
            <div class="field"><div class="field-label">HSN</div><div class="field-value">${args.hsn || '—'}</div></div>
            <div class="field"><div class="field-label">Serial managed</div><div class="field-value">${args.isSerialManaged ? 'Yes' : 'No'}</div></div>
            <div class="field"><div class="field-label">Serial numbers</div><div class="field-value">${(args.serialNumbers || []).join(', ') || '—'}</div></div>
          </div>
          <div class="status"><span class="dot"></span> Pending</div>
        `;
      } else {
        card.innerHTML = `
          <div class="event-header">
            <div class="event-name">${row.event_name}</div>
            <span class="badge badge-blue">${row.stream_id}</span>
          </div>
          <div class="seq">seq #${row.seqnum} &nbsp;·&nbsp; ${created}</div>
          <pre style="font-size:12px;color:#555;white-space:pre-wrap">${JSON.stringify(args, null, 2)}</pre>
        `;
      }

      document.getElementById("events").prepend(card);
    }

    function clearAll() {
      total = 0; b2b = 0; stock = 0;
      document.getElementById("count").textContent = 0;
      document.getElementById("b2b-count").textContent = 0;
      document.getElementById("stock-count").textContent = 0;
      document.getElementById("events").innerHTML = "";
      document.getElementById("status-bar").textContent = "Not connected.";
    }
  </script>
</body>
</html>
