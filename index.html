<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SQL Runner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #0d0d0d; color: #e2e2e2; min-height: 100vh; display: flex; flex-direction: column; }

  header { padding: 1rem 1.5rem; border-bottom: 1px solid #1f1f1f; display: flex; align-items: center; gap: 10px; }
  header span { font-size: 13px; color: #555; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; }

  .editor-area { padding: 1.5rem; display: flex; flex-direction: column; gap: 12px; }

  textarea {
    width: 100%;
    height: 140px;
    background: #111;
    border: 1px solid #222;
    border-radius: 6px;
    color: #e2e2e2;
    font-family: monospace;
    font-size: 14px;
    padding: 12px;
    resize: vertical;
    outline: none;
    line-height: 1.6;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: #333; }

  .toolbar { display: flex; align-items: center; gap: 10px; }

  button {
    background: #e2e2e2;
    color: #0d0d0d;
    border: none;
    border-radius: 5px;
    padding: 8px 18px;
    font-family: monospace;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.1s;
  }
  button:hover { background: #fff; }
  button:active { background: #ccc; }
  button:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }

  .btn-clear { background: transparent; color: #555; border: 1px solid #222; }
  .btn-clear:hover { background: #1a1a1a; color: #e2e2e2; }

  .status { font-size: 12px; color: #555; margin-left: auto; }
  .status.ok { color: #22c55e; }
  .status.err { color: #ef4444; }
  .status.loading { color: #facc15; }

  .result-area { flex: 1; padding: 0 1.5rem 1.5rem; }

  .result-meta { font-size: 12px; color: #555; margin-bottom: 10px; }

  .table-wrap { overflow-x: auto; border: 1px solid #1f1f1f; border-radius: 6px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: #161616; border-bottom: 1px solid #222; }
  th { padding: 9px 14px; text-align: left; color: #888; font-weight: 500; white-space: nowrap; }
  td { padding: 8px 14px; border-bottom: 1px solid #1a1a1a; color: #d1d1d1; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #111; }

  .null-val { color: #444; font-style: italic; }

  .empty-state { text-align: center; padding: 3rem; color: #333; font-size: 13px; }

  .error-box { background: #1a0a0a; border: 1px solid #3a1a1a; border-radius: 6px; padding: 12px 16px; color: #ef4444; font-size: 13px; line-height: 1.6; }

  .json-box { background: #111; border: 1px solid #222; border-radius: 6px; padding: 12px 16px; font-size: 13px; color: #a3e635; overflow-x: auto; white-space: pre; }
</style>
</head>
<body>

<header>
  <span class="dot"></span>
  <span>localhost:3000/query</span>
</header>

<div class="editor-area">
  <textarea id="query" placeholder="SELECT * FROM users LIMIT 10;" spellcheck="false">SELECT * FROM users LIMIT 10;</textarea>
  <div class="toolbar">
    <button id="run-btn" onclick="runQuery()">▶ Run</button>
    <button class="btn-clear" onclick="clearAll()">Clear</button>
    <span class="status" id="status"></span>
  </div>
</div>

<div class="result-area" id="result-area">
  <div class="empty-state">Run a query to see results</div>
</div>

<script>
const API = 'https://20.87.39.192/sync/api/query';

async function runQuery() {
  const sql = document.getElementById('query').value.trim();
  if (!sql) return;

  const btn = document.getElementById('run-btn');
  const status = document.getElementById('status');
  const area = document.getElementById('result-area');

  btn.disabled = true;
  status.className = 'status loading';
  status.textContent = 'Running…';
  area.innerHTML = '';

  const t0 = Date.now();

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: sql })
    });

    const elapsed = Date.now() - t0;
    const data = await res.json();

    if (!res.ok) {
      status.className = 'status err';
      status.textContent = `Error ${res.status}`;
      area.innerHTML = `<div class="error-box">${escHtml(data.error || data.message || JSON.stringify(data))}</div>`;
      return;
    }

    // Try to render as table — support common shapes:
    // { rows: [...] } or { data: [...] } or [...] directly
    const rows = Array.isArray(data) ? data
      : Array.isArray(data.rows) ? data.rows
      : Array.isArray(data.data) ? data.data
      : null;

    if (rows && rows.length > 0) {
      const cols = Object.keys(rows[0]);
      const rowCount = rows.length;

      status.className = 'status ok';
      status.textContent = `${rowCount} row${rowCount !== 1 ? 's' : ''} · ${elapsed}ms`;

      area.innerHTML = `
        <div class="result-meta">${rowCount} row${rowCount !== 1 ? 's' : ''} returned in ${elapsed}ms</div>
        <div class="table-wrap">
          <table>
            <thead><tr>${cols.map(c => `<th>${escHtml(c)}</th>`).join('')}</tr></thead>
            <tbody>
              ${rows.map(row =>
                `<tr>${cols.map(c => {
                  const v = row[c];
                  return v === null || v === undefined
                    ? `<td><span class="null-val">NULL</span></td>`
                    : `<td>${escHtml(String(v))}</td>`;
                }).join('')}</tr>`
              ).join('')}
            </tbody>
          </table>
        </div>`;

    } else if (rows && rows.length === 0) {
      status.className = 'status ok';
      status.textContent = `0 rows · ${elapsed}ms`;
      area.innerHTML = `<div class="empty-state">Query returned 0 rows</div>`;

    } else {
      // Non-select response (INSERT/UPDATE/DELETE etc.)
      status.className = 'status ok';
      status.textContent = `Done · ${elapsed}ms`;
      area.innerHTML = `<div class="json-box">${JSON.stringify(data, null, 2)}</div>`;
    }

  } catch (err) {
    status.className = 'status err';
    status.textContent = 'Failed';
    area.innerHTML = `<div class="error-box">Could not reach API: ${escHtml(err.message)}</div>`;
  } finally {
    btn.disabled = false;
  }
}

function clearAll() {
  document.getElementById('query').value = '';
  document.getElementById('result-area').innerHTML = '<div class="empty-state">Run a query to see results</div>';
  document.getElementById('status').textContent = '';
  document.getElementById('status').className = 'status';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('query').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runQuery();
});
</script>
</body>
</html>
